<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bedayti Dashboard Pro - Full Slider</title>

    <style>
        :root {
            --primary-bg: #ffffff;
            --header-bg: #ffffff;
            --text-color: #333333;
            --clock-bg: #f8f8f8;
            --border-color: #f0f0f0;
            --accent: #000000;
        }

        [data-theme="dark"] {
            --primary-bg: #121212;
            --header-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --clock-bg: #333333;
            --border-color: #333333;
            --accent: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            overflow: hidden; 
            height: 100vh;
        }

        /* الهيدر */
        .header {
            height: 65px;
            padding: 0 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
            position: relative;
            z-index: 1000;
        }

        .header img { height: 40px; }
        .header span { font-size: 24px; font-weight: bold; }

        .digital-clock {
            font-size: 20px;
            font-weight: 600;
            background: var(--clock-bg);
            padding: 5px 15px;
            border-radius: 8px;
            direction: ltr;
        }

        /* شريط التقدم */
        .progress-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(0,0,0,0.05);
        }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.1s linear; }

        /* منطقة السلايدر */
        .slider-wrapper {
            position: relative;
            width: 88%; /* مساحة متوازنة */
            margin: 20px auto 0;
            height: calc(100vh - 160px);
        }

        .slider {
            width: 100%;
            height: 100%;
            position: relative;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
        }

        /* الأسهم - خارج الصندوق */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 50px;
            color: var(--accent);
            background: none;
            border: none;
            cursor: pointer;
            z-index: 2000;
            transition: 0.3s;
        }
        .arrow-right { right: -60px; } 
        .arrow-left { left: -60px; }
        .nav-arrow:hover { transform: translateY(-50%) scale(1.2); opacity: 0.6; }

        /* السلايدات */
        .slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.8s ease-in-out; /* انتقال ناعم */
        }
        .slide.active { opacity: 1; visibility: visible; }

        /* عرض الشيت كاملاً */
        .frame-container { 
            width: 100%; 
            height: 100%;
        }
        .frame-container iframe { 
            width: 100%; 
            height: 100%;
            border: none;
        }

        /* النقاط السفلية */
        .dots { text-align: center; padding-top: 15px; }
        .dot {
            height: 9px;
            width: 9px;
            margin: 0 5px;
            display: inline-block;
            background: #ddd;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
        }
        .dot.active { background: var(--accent); width: 22px; border-radius: 10px; }
    </style>
</head>

<body>

<div class="header">
    <div class="header-right">
        <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABwAAAAbCAMAAABY1h8eAAAAWlBMVEVHcEzpqkLwVCP1UB36NxDwVCPwVCPwVCPwVCP6ojrtJxjwVCPwVCP+x0X+x0X+x0X/yEX+x0X/ykX/zEbwVCP/ykYAs4gCtIkDsoYEsIUEsIUEsIUEsIUEsIXbndjvAAAAHnRSTlMABKN2ML7/84ANRlWvOpbM5/9j9/WiDjmH/l+rwhCJxqtyAAAAgElEQVR4AazRRQKAMAxE0RR3t5T7nxN3mKz421cvbSkSMkwLu+04rolxypPQ8SUMJAxp7jU/2jFO0kwBTPI8BxgUuYDZJxorlj9jeMH0YUq5Jxb0LDwwpXdBtWJNn1mmVRfgY5q2awnUMbMG1vMUmNnynLAoa3FHhONkpGQZSAIAJFMKpmlo+LwAAAAASUVORK5CYII=" alt="Logo">
        <span>بدايتي</span>
    </div>
    
    <div class="header-left">
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" style="background: var(--clock-bg); border: 1px solid var(--border-color); color: var(--text-color); padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold;">الوضع الليلي 🌙</button>
        <div class="digital-clock" id="clock">00:00:00 --</div>
    </div>

    <div class="progress-container">
        <div class="progress-bar" id="myBar"></div>
    </div>
</div>

<div class="slider-wrapper">
    <button class="nav-arrow arrow-right" onclick="prevSlide()">&#10094;</button>
    <button class="nav-arrow arrow-left" onclick="nextSlide()">&#10095;</button>

    <div class="slider" id="mainSlider">
        <div class="slide active">
            <div class="frame-container"><iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQO7aKS8kk7_lbsJZdqXwXM7a-m_Q47vtPBhWu7FnEV4XPdJeumnYxs8a9qRXegPmSn9c99ujfZTAun/pubhtml?gid=945247300&amp;single=true&amp;widget=false&amp;headers=false"></iframe></div>
        </div>
        <div class="slide">
            <div class="frame-container"><iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQO7aKS8kk7_lbsJZdqXwXM7a-m_Q47vtPBhWu7FnEV4XPdJeumnYxs8a9qRXegPmSn9c99ujfZTAun/pubhtml?gid=0&amp;single=true&amp;widget=false&amp;headers=false"></iframe></div>
        </div>
        <div class="slide">
            <div class="frame-container"><iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQO7aKS8kk7_lbsJZdqXwXM7a-m_Q47vtPBhWu7FnEV4XPdJeumnYxs8a9qRXegPmSn9c99ujfZTAun/pubhtml?gid=473434321&amp;single=true&amp;widget=false&amp;headers=false"></iframe></div>
        </div>
        <div class="slide">
            <div class="frame-container"><iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQO7aKS8kk7_lbsJZdqXwXM7a-m_Q47vtPBhWu7FnEV4XPdJeumnYxs8a9qRXegPmSn9c99ujfZTAun/pubhtml?gid=896382074&amp;single=true&amp;widget=false&amp;headers=false"></iframe></div>
        </div>
        <div class="slide">
            <div class="frame-container"><iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQO7aKS8kk7_lbsJZdqXwXM7a-m_Q47vtPBhWu7FnEV4XPdJeumnYxs8a9qRXegPmSn9c99ujfZTAun/pubhtml?gid=1337759571&amp;single=true&amp;widget=false&amp;headers=false"></iframe></div>
        </div>
        <div class="slide">
            <div class="frame-container"><iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQO7aKS8kk7_lbsJZdqXwXM7a-m_Q47vtPBhWu7FnEV4XPdJeumnYxs8a9qRXegPmSn9c99ujfZTAun/pubhtml?gid=1275750285&amp;single=true&amp;widget=false&amp;headers=false"></iframe></div>
        </div>
        <div class="slide">
            <div class="frame-container"><iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQO7aKS8kk7_lbsJZdqXwXM7a-m_Q47vtPBhWu7FnEV4XPdJeumnYxs8a9qRXegPmSn9c99ujfZTAun/pubhtml?gid=55889572&amp;single=true&amp;widget=false&amp;headers=false"></iframe></div>
        </div>
        <div class="slide">
            <div class="frame-container"><iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQO7aKS8kk7_lbsJZdqXwXM7a-m_Q47vtPBhWu7FnEV4XPdJeumnYxs8a9qRXegPmSn9c99ujfZTAun/pubhtml?gid=55889572&amp;single=true&amp;widget=false&amp;headers=false"></iframe></div>
        </div>
        <div class="slide">
            <div class="frame-container"><iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQO7aKS8kk7_lbsJZdqXwXM7a-m_Q47vtPBhWu7FnEV4XPdJeumnYxs8a9qRXegPmSn9c99ujfZTAun/pubhtml?gid=1484758797&amp;single=true&amp;widget=false&amp;headers=false"></iframe></div>
        </div>
    </div>
</div>

<div class="dots" id="dotsContainer"></div>

<script>
    let slides = document.querySelectorAll(".slide");
    let dotsContainer = document.getElementById("dotsContainer");
    let progressBar = document.getElementById("myBar");
    let current = 0;
    const duration = 60000; // دقيقة واحدة لكل سلايد
    let startTime = Date.now();
    let timerId;

    // إنشاء النقاط السفلية
    slides.forEach((_, index) => {
        let dot = document.createElement("span");
        dot.classList.add("dot");
        if(index === 0) dot.classList.add("active");
        dot.onclick = () => changeTo(index);
        dotsContainer.appendChild(dot);
    });
    let dots = document.querySelectorAll(".dot");

    // وظيفة تحديث الساعة
    function updateClock() {
        const now = new Date();
        let hours = now.getHours();
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12;
        document.getElementById('clock').textContent = `${String(hours).padStart(2, '0')}:${minutes}:${seconds} ${ampm}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // وظيفة تبديل السلايد
    function changeTo(index) {
        slides[current].classList.remove("active");
        dots[current].classList.remove("active");
        
        current = (index + slides.length) % slides.length;
        
        slides[current].classList.add("active");
        dots[current].classList.add("active");
        
        // إعادة ضبط التوقيت والبار
        startTime = Date.now();
        progressBar.style.width = "0%";
        resetTimer();
    }

    function nextSlide() { changeTo(current + 1); }
    function prevSlide() { changeTo(current - 1); }

    function resetTimer() {
        clearInterval(timerId);
        timerId = setInterval(nextSlide, duration);
    }

    // تحديث شريط التقدم بالثواني
    function animateProgress() {
        let elapsed = Date.now() - startTime;
        let progress = (elapsed / duration) * 100;
        if (progress <= 100) {
            progressBar.style.width = progress + "%";
        }
        requestAnimationFrame(animateProgress);
    }

    // تبديل الثيم
    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById("themeBtn");
        if (body.getAttribute("data-theme") === "dark") {
            body.removeAttribute("data-theme");
            btn.innerText = "الوضع الليلي 🌙";
        } else {
            body.setAttribute("data-theme", "dark");
            btn.innerText = "الوضع النهاري ☀️";
        }
    }

    // البداية
    window.onload = () => {
        resetTimer();
        animateProgress();
    };

    // تحديث المحتوى كل 5 دقائق
    setInterval(() => {
        document.querySelectorAll("iframe").forEach(frame => { frame.src = frame.src; });
    }, 300000);
</script>

</body>
</html>
