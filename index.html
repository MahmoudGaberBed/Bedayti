<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bedayti Dashboard Pro</title>

    <style>
        :root {
            --primary-bg: #ffffff;
            --header-bg: #ffffff;
            --text-color: #333333;
            --clock-bg: #f8f8f8;
            --border-color: #f0f0f0;
            --accent: #000000;
        }

        /* ألوان الدارك مود */
        [data-theme="dark"] {
            --primary-bg: #121212;
            --header-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --clock-bg: #333333;
            --border-color: #333333;
            --accent: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            overflow: hidden; 
            height: 100vh;
            transition: all 0.3s ease;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("https://bedayti.com/assets/images/Bedayati-logo-top-ar.png");
            background-repeat: no-repeat;
            background-position: center;
            background-size: 300px;
            opacity: 0.03;
            z-index: -1;
        }

        .header {
            height: 65px;
            padding: 0 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header img { height: 40px; }
        .header span { font-size: 24px; font-weight: bold; color: var(--text-color); }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* زر الدارك مود */
        .theme-toggle {
            background: var(--clock-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: 0.3s;
        }
        .theme-toggle:hover { background: var(--accent); color: var(--primary-bg); }

        .digital-clock {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-color);
            background: var(--clock-bg);
            padding: 5px 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            direction: ltr;
        }

        .progress-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(0,0,0,0.05);
        }
        .progress-bar {
            height: 100%;
            background: var(--accent);
            width: 0%;
        }

        .slider-wrapper {
            position: relative;
            width: 92%; 
            margin: 20px auto 0;
        }

        .slider {
            width: 100%;
            height: calc(100vh - 150px);
            position: relative;
            background: white; /* الشيتات تظل خلفيتها بيضاء لسهولة القراءة */
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
        }

        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 50px;
            color: var(--accent);
            background: none;
            border: none;
            cursor: pointer;
            z-index: 200;
            padding: 10px;
            transition: 0.3s;
        }

        .nav-arrow:hover { transform: translateY(-50%) scale(1.2); }
        .arrow-right { right: -65px; } 
        .arrow-left { left: -65px; }

        .slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.8s ease-in-out;
        }
        .slide.active { opacity: 1; visibility: visible; }

        .frame-container { width: 100%; height: 100%; }
        .frame-container iframe { width: 100%; height: 100%; border: none; }

        .dots { text-align: center; padding-top: 15px; }
        .dot {
            height: 9px;
            width: 9px;
            margin: 0 5px;
            display: inline-block;
            background: #ddd;
            border-radius: 50%;
            cursor: pointer;
        }
        .dot.active { background: var(--accent); width: 20px; border-radius: 10px; }
    </style>
</head>

<body>

<div class="header">
    <div class="header-right">
        <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABwAAAAbCAMAAABY1h8eAAAAWlBMVEVHcEzpqkLwVCP1UB36NxDwVCPwVCPwVCPwVCP6ojrtJxjwVCPwVCP+x0X+x0X+x0X/yEX+x0X/ykX/zEbwVCP/ykYAs4gCtIkDsoYEsIUEsIUEsIUEsIUEsIXbndjvAAAAHnRSTlMABKN2ML7/84ANRlWvOpbM5/9j9/WiDjmH/l+rwhCJxqtyAAAAgElEQVR4AazRRQKAMAxE0RR3t5T7nxN3mKz421cvbSkSMkwLu+04rolxypPQ8SUMJAxp7jU/2jFO0kwBTPI8BxgUuYDZJxorlj9jeMH0YUq5Jxb0LDwwpXdBtWJNn1mmVRfgY5q2awnUMbMG1vMUmNnynLAoa3FHhONkpGQZSAIAJFMKpmlo+LwAAAAASUVORK5CYII=" alt="Logo">
        <span>بدايتي</span>
    </div>
    
    <div class="header-left">
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">الوضع الليلي 🌙</button>
        <div class="digital-clock" id="clock">00:00:00 --</div>
    </div>

    <div class="progress-container">
        <div class="progress-bar" id="myBar"></div>
    </div>
</div>

<div class="slider-wrapper">
    <button class="nav-arrow arrow-right" onclick="prevSlide()">&#10094;</button>
    <button class="nav-arrow arrow-left" onclick="nextSlide()">&#10095;</button>

    <div class="slider">
        <div class="slide active">
            <div class="frame-container"><iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQO7aKS8kk7_lbsJZdqXwXM7a-m_Q47vtPBhWu7FnEV4XPdJeumnYxs8a9qRXegPmSn9c99ujfZTAun/pubhtml?gid=945247300&amp;single=true&amp;widget=false&amp;headers=false"></iframe></div>
        </div>
        <div class="slide">
            <div class="frame-container"><iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQO7aKS8kk7_lbsJZdqXwXM7a-m_Q47vtPBhWu7FnEV4XPdJeumnYxs8a9qRXegPmSn9c99ujfZTAun/pubhtml?gid=0&amp;single=true&amp;widget=false&amp;headers=false"></iframe></div>
        </div>
        <div class="slide">
            <div class="frame-container"><iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQO7aKS8kk7_lbsJZdqXwXM7a-m_Q47vtPBhWu7FnEV4XPdJeumnYxs8a9qRXegPmSn9c99ujfZTAun/pubhtml?gid=473434321&amp;single=true&amp;widget=false&amp;headers=false"></iframe></div>
        </div>
        <div class="slide">
            <div class="frame-container"><iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQO7aKS8kk7_lbsJZdqXwXM7a-m_Q47vtPBhWu7FnEV4XPdJeumnYxs8a9qRXegPmSn9c99ujfZTAun/pubhtml?gid=896382074&amp;single=true&amp;widget=false&amp;headers=false"></iframe></div>
        </div>
        <div class="slide">
            <div class="frame-container"><iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQO7aKS8kk7_lbsJZdqXwXM7a-m_Q47vtPBhWu7FnEV4XPdJeumnYxs8a9qRXegPmSn9c99ujfZTAun/pubhtml?gid=1337759571&amp;single=true&amp;widget=false&amp;headers=false"></iframe></div>
        </div>
        <div class="slide">
            <div class="frame-container"><iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQO7aKS8kk7_lbsJZdqXwXM7a-m_Q47vtPBhWu7FnEV4XPdJeumnYxs8a9qRXegPmSn9c99ujfZTAun/pubhtml?gid=1484758797&amp;single=true&amp;widget=false&amp;headers=false"></iframe></div>
        </div>
    </div>
</div>

<div class="dots" id="dotsContainer"></div>

<script>
    let slides = document.querySelectorAll(".slide");
    let dotsContainer = document.getElementById("dotsContainer");
    let progressBar = document.getElementById("myBar");
    let current = 0;
    const duration = 60000; 
    let startTime;
    let timerId;

    // وظيفة الدارك مود
    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById("themeBtn");
        if (body.getAttribute("data-theme") === "dark") {
            body.removeAttribute("data-theme");
            btn.innerText = "الوضع الليلي 🌙";
        } else {
            body.setAttribute("data-theme", "dark");
            btn.innerText = "الوضع النهاري ☀️";
        }
    }

    // تحديث الساعة بنظام 12 ساعة
    function updateClock() {
        const now = new Date();
        let hours = now.getHours();
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12;
        document.getElementById('clock').textContent = `${String(hours).padStart(2, '0')}:${minutes}:${seconds} ${ampm}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    slides.forEach((_, index) => {
        let dot = document.createElement("span");
        dot.classList.add("dot");
        if(index === 0) dot.classList.add("active");
        dot.onclick = () => changeTo(index);
        dotsContainer.appendChild(dot);
    });
    let dots = document.querySelectorAll(".dot");

    function updateProgress() {
        if (!startTime) startTime = Date.now();
        let elapsed = Date.now() - startTime;
        let progress = (elapsed / duration) * 100;
        if (progress <= 100) {
            progressBar.style.width = progress + "%";
            requestAnimationFrame(updateProgress);
        }
    }

    function changeTo(index) {
        slides[current].classList.remove("active");
        dots[current].classList.remove("active");
        current = (index + slides.length) % slides.length;
        slides[current].classList.add("active");
        dots[current].classList.add("active");
        startTime = Date.now();
        progressBar.style.width = "0%";
        clearInterval(timerId);
        timerId = setInterval(nextSlide, duration);
    }

    function nextSlide() { changeTo(current + 1); }
    function prevSlide() { changeTo(current - 1); }

    window.onload = () => {
        startTime = Date.now();
        updateProgress();
        timerId = setInterval(nextSlide, duration);
    };

    setInterval(() => {
        document.querySelectorAll("iframe").forEach(frame => { frame.src = frame.src; });
    }, 300000);
</script>

</body>
</html>
